# mouse
set -g mouse on

# start windows and panes numbering from 1 (not 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# open panes in current dir
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# scrap terminal
bind 'T' popup -E -d "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# set prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# use tmux's own terminfo and enable truecolor
set -g default-terminal "xterm-256color"
set -ga terminal-features ",xterm-256color:RGB"

# allow image passthrough for kitty
# (needed for image.nvim plugin)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Tokyo Night status bar
set -g status-style 'bg=#7aa2f7 fg=#1a1b26'
set -g status-left-style 'bg=#7aa2f7 fg=#1a1b26 bold'
set -g status-right-style 'bg=#565f89 fg=#c0caf5'
set -g window-status-style 'bg=#7aa2f7 fg=#1a1b26'
set -g window-status-current-style 'bg=#7aa2f7 fg=#1a1b26 bold'
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#7aa2f7'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
